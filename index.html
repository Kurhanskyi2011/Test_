<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PC Store Pro</title>

<style>
:root{
  --green:#00a046;
  --dark:#1f1f1f;
  --gray:#f5f5f5;
}

*{margin:0;padding:0;box-sizing:border-box;font-family:Segoe UI}
body{background:var(--gray)}

header{
  background:var(--green);
  color:white;
  padding:15px 40px;
  display:flex;
  align-items:center;
  justify-content:space-between;
}

.burger{
  flex-direction:column;
  cursor:pointer;
  margin-right:10px;
}

.burger div{
  width:25px;
  height:3px;
  background:white;
  margin:3px 0;
}

.logo{font-size:22px;font-weight:bold}

.search{
  flex:1;
  margin:0 20px;
}

.search input{
  width:100%;
  padding:10px;
  border-radius:6px;
  border:none;
}

nav button{
  margin-left:10px;
  background:white;
  color:black;
}

.layout{
  display:flex;
}

.sidebar{
  width:250px;
  background:white;
  padding:20px;
  position:fixed;
  left:0;
  top:80px;
  height:calc(100% - 80px);
  overflow:auto;
  box-shadow:5px 0 20px rgba(0,0,0,.2);
  transform:translateX(-100%);
  transition:.3s;
  display:none;
}

.sidebar.open{
  transform:translateX(0);
  display:block;
}

.sidebar h3{margin-bottom:10px}

.sidebar input{
  width:100%;
  margin-bottom:10px;
  padding:8px;
}

.sidebar label{
  display:flex;
  align-items:center;
  margin-bottom:5px;
  white-space:nowrap;
}

.sidebar input[type="checkbox"]{
  margin-right:5px;
  width:auto;
}

.products{
  flex:1;
  padding:20px;
  display:grid;
  grid-template-columns: repeat(6, 1fr);
  gap:20px;
  transition:.3s;
}

.sidebar.open ~ .products{
  margin-left:250px;
}

.card{
  background:white;
  border-radius:10px;
  padding:10px;
  transition:.2s;
}

.card:hover{box-shadow:0 5px 20px rgba(0,0,0,.2)}

.card img{
  width:100%;
  height:120px;
  object-fit:cover;
}

.card h4{
  font-size:14px;
  margin:5px 0;
}

.card p{
  font-size:12px;
  margin:2px 0;
}

button{
  padding:8px 12px;
  border:none;
  border-radius:6px;
  cursor:pointer;
  background:var(--green);
  color:white;
}

.cart{
  position:fixed;
  right:0;
  top:0;
  width:320px;
  height:100%;
  background:white;
  padding:20px;
  overflow:auto;
  box-shadow:-5px 0 20px rgba(0,0,0,.2);
}

.modal{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,.5);
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:1000;
}

.modal-content{
  background:white;
  padding:20px;
  border-radius:10px;
  width:300px;
}

.hidden{display:none}
</style>
</head>

<body>

<header>
  <div class="burger" onclick="toggleSidebar()">
    <div></div>
    <div></div>
    <div></div>
  </div>
  <div class="logo">PC STORE</div>
  <div class="search">
    <input id="search" placeholder="Пошук комп'ютерів..." oninput="render()">
  </div>
  <nav>
    <button onclick="toggleCart()">Кошик (<span id="count">0</span>)</button>
    <button id="loginBtn" onclick="showModal('login')">Увійти</button>
    <button id="registerBtn" onclick="showModal('register')">Реєстрація</button>
    <button id="profileBtn" onclick="showModal('profile')" style="display:none">Профіль</button>
  </nav>
</header>

<div class="layout">

<div class="layout">

  <div class="sidebar" id="sidebar">
    <h3>Фільтри</h3>
    <h4>Категорія</h4>
    <label><input type="checkbox" value="Gaming" onchange="render()"> Gaming</label><br>
    <label><input type="checkbox" value="Office" onchange="render()"> Office</label><br>
    <label><input type="checkbox" value="Budget" onchange="render()"> Budget</label><br>
    <label><input type="checkbox" value="Workstation" onchange="render()"> Workstation</label><br>
    <label><input type="checkbox" value="Mini" onchange="render()"> Mini</label><br>
    <label><input type="checkbox" value="Server" onchange="render()"> Server</label><br>
    <label><input type="checkbox" value="All-in-One" onchange="render()"> All-in-One</label><br>

    <h4>Ціна</h4>
    <label>Мін ціна</label>
    <input id="minPrice" type="number" oninput="render()">

    <label>Макс ціна</label>
    <input id="maxPrice" type="number" oninput="render()">

    <h4>Відеокарта</h4>
    <select id="gpuFilter" onchange="render()">
      <option value="">Всі</option>
      <option value="RTX 4060">RTX 4060</option>
      <option value="Integrated">Integrated</option>
      <option value="RTX 4090">RTX 4090</option>
      <option value="GTX 1650">GTX 1650</option>
      <option value="RTX 3080">RTX 3080</option>
      <option value="RTX 4070">RTX 4070</option>
      <option value="Quadro">Quadro</option>
    </select>

    <h4>Процесор</h4>
    <select id="cpuFilter" onchange="render()">
      <option value="">Всі</option>
      <option value="Intel i7">Intel i7</option>
      <option value="Intel i5">Intel i5</option>
      <option value="Intel i9">Intel i9</option>
      <option value="Ryzen 5">Ryzen 5</option>
      <option value="Xeon">Xeon</option>
      <option value="Intel i3">Intel i3</option>
      <option value="Dual Xeon">Dual Xeon</option>
      <option value="Ryzen 3">Ryzen 3</option>
    </select>

    <h4>Оперативна пам'ять</h4>
    <select id="ramFilter" onchange="render()">
      <option value="">Всі</option>
      <option value="8GB">8GB</option>
      <option value="16GB">16GB</option>
      <option value="32GB">32GB</option>
      <option value="64GB">64GB</option>
      <option value="128GB">128GB</option>
    </select>
  </div>

  <div class="products" id="products"></div>

</div>

<div id="cart" class="cart hidden">
  <h3>Кошик</h3>
  <button onclick="toggleCart()" style="float:right;">Закрити</button>
  <div id="cartItems"></div>
  <h4>Сума: <span id="total">0</span> грн</h4>
  <button onclick="orderAll()">Замовити все</button>
</div>

<!-- Modals -->
<div id="loginModal" class="modal hidden">
  <div class="modal-content">
    <h3>Увійти</h3>
    <input id="loginEmail" type="email" placeholder="Email" required>
    <input id="loginPassword" type="password" placeholder="Пароль" required>
    <button onclick="login()">Увійти</button>
    <button onclick="showModal('forgot')">Забули пароль?</button>
    <button onclick="closeModal()">Закрити</button>
  </div>
</div>

<div id="registerModal" class="modal hidden">
  <div class="modal-content">
    <h3>Реєстрація</h3>
    <input id="regEmail" type="email" placeholder="Email" required>
    <input id="regPassword" type="password" placeholder="Пароль" required>
    <button onclick="register()">Зареєструватися</button>
    <button onclick="closeModal()">Закрити</button>
  </div>
</div>

<div id="forgotModal" class="modal hidden">
  <div class="modal-content">
    <h3>Відновлення пароля</h3>
    <input id="forgotEmail" type="email" placeholder="Email" required>
    <button onclick="forgotPassword()">Надіслати код</button>
    <input id="resetCode" type="text" placeholder="Код" style="display:none">
    <input id="newPassword" type="password" placeholder="Новий пароль" style="display:none">
    <button onclick="resetPassword()" style="display:none">Скинути пароль</button>
    <button onclick="closeModal()">Закрити</button>
  </div>
</div>

<div id="profileModal" class="modal hidden">
  <div class="modal-content">
    <h3>Профіль</h3>
    <p id="userEmail"></p>
    <button onclick="logout()">Вийти</button>
    <button onclick="closeModal()">Закрити</button>
  </div>
</div>

<script src="products.js"></script>
<script>
let cart = [];

function render(){
  const el = document.getElementById("products");
  const search = document.getElementById("search").value.toLowerCase();
  const min = +document.getElementById("minPrice").value || 0;
  const max = +document.getElementById("maxPrice").value || Infinity;

  const selectedCategories = Array.from(document.querySelectorAll('#sidebar input[type="checkbox"]:checked')).map(cb => cb.value);
  const gpu = document.getElementById("gpuFilter").value;
  const cpu = document.getElementById("cpuFilter").value;
  const ram = document.getElementById("ramFilter").value;

  el.innerHTML = "";

  products
    .filter(p=>p.name.toLowerCase().includes(search))
    .filter(p=>p.price>=min && p.price<=max)
    .filter(p=>selectedCategories.length === 0 || selectedCategories.includes(p.category))
    .filter(p=>!gpu || p.gpu === gpu)
    .filter(p=>!cpu || p.cpu === cpu)
    .filter(p=>!ram || p.ram === ram)
    .forEach((p,i)=>{
      el.innerHTML += `
        <div class="card">
          <img src="${p.img}">
          <h4>${p.name}</h4>
          <p class="price">${p.price} грн</p>
          <p>Відеокарта: ${p.gpu}</p>
          <p>Процесор: ${p.cpu}</p>
          <p>RAM: ${p.ram}</p>
          <button onclick="addToCart(${i})">Купити</button>
        </div>
      `;
    });

  renderCart();
}

function addToCart(i){
  cart.push(products[i]);
  render();
}

function renderCart(){
  const el = document.getElementById("cartItems");
  let total = 0;
  el.innerHTML="";

  cart.forEach((p,i)=>{
    total += p.price;
    el.innerHTML += `<p>${p.name} - ${p.price} грн <button onclick="removeFromCart(${i})">Видалити</button></p>`;
  });

  document.getElementById("total").innerText = total;
  document.getElementById("count").innerText = cart.length;
}

function removeFromCart(i){
  cart.splice(i,1);
  render();
}

function orderAll(){
  if(cart.length === 0){
    alert("Кошик порожній!");
    return;
  }
  alert(`Замовлено ${cart.length} товарів на суму ${document.getElementById("total").innerText} грн`);
  cart = [];
  render();
}

function toggleCart(){
  document.getElementById("cart").classList.toggle("hidden");
}

function toggleSidebar(){
  document.getElementById("sidebar").classList.toggle("open");
}

let token = localStorage.getItem('token');

function showModal(type){
  if (type === 'profile' && token) {
    loadProfile();
  }
  document.getElementById('loginModal').classList.add('hidden');
  document.getElementById('registerModal').classList.add('hidden');
  document.getElementById('forgotModal').classList.add('hidden');
  document.getElementById('profileModal').classList.add('hidden');
  document.getElementById(type + 'Modal').classList.remove('hidden');
}

async function loadProfile(){
  const res = await fetch('/profile', {
    headers: { 'Authorization': token }
  });
  const data = await res.json();
  if (res.ok) {
    document.getElementById('userEmail').innerText = 'Email: ' + data.email;
  }
}

function closeModal(){
  document.getElementById('loginModal').classList.add('hidden');
  document.getElementById('registerModal').classList.add('hidden');
  document.getElementById('forgotModal').classList.add('hidden');
  document.getElementById('profileModal').classList.add('hidden');
}

async function register(){
  const email = document.getElementById('regEmail').value;
  const password = document.getElementById('regPassword').value;
  const res = await fetch('/register', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ email, password })
  });
  const data = await res.json();
  alert(data.message);
  if (res.ok) closeModal();
}

async function login(){
  const email = document.getElementById('loginEmail').value;
  const password = document.getElementById('loginPassword').value;
  const res = await fetch('/login', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ email, password })
  });
  const data = await res.json();
  if (res.ok) {
    token = data.token;
    localStorage.setItem('token', token);
    updateUI();
    closeModal();
  } else {
    alert(data.message);
  }
}

async function forgotPassword(){
  const email = document.getElementById('forgotEmail').value;
  const res = await fetch('/forgot-password', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ email })
  });
  const data = await res.json();
  alert(data.message);
  if (res.ok) {
    document.getElementById('resetCode').style.display = 'block';
    document.getElementById('newPassword').style.display = 'block';
    document.querySelector('#forgotModal button:nth-child(4)').style.display = 'block';
  }
}

async function resetPassword(){
  const email = document.getElementById('forgotEmail').value;
  const code = document.getElementById('resetCode').value;
  const newPassword = document.getElementById('newPassword').value;
  const res = await fetch('/reset-password', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ email, code, newPassword })
  });
  const data = await res.json();
  alert(data.message);
  if (res.ok) closeModal();
}

async function logout(){
  token = null;
  localStorage.removeItem('token');
  updateUI();
  closeModal();
}

function updateUI(){
  const loginBtn = document.getElementById('loginBtn');
  const registerBtn = document.getElementById('registerBtn');
  const profileBtn = document.getElementById('profileBtn');
  if (token) {
    loginBtn.style.display = 'none';
    registerBtn.style.display = 'none';
    profileBtn.style.display = 'inline-block';
  } else {
    loginBtn.style.display = 'inline-block';
    registerBtn.style.display = 'inline-block';
    profileBtn.style.display = 'none';
  }
}

updateUI();

render();
</script>

</body>
</html>
